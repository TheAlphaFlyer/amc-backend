message PlayerPosition {
    fixed64 unique_id = 1 [jstype = JS_STRING];
    string player_name = 2;
    double z = 3;
    double y = 4;
    double x = 5;
    oneof vehicle_key {
        VehicleKey vehicle_key_enum = 6;
        string vehicle_key_unknown = 7;
    }
}

message PlayerPositions {
    repeated PlayerPosition players = 1;
}
